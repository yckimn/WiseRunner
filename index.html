<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WiseRunner - AI 러닝 코치</title>
  <style>
    body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
    .loader { text-align: center; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fc4c02; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvExmvaBf-jEVFyLZI-1BodcCDN9zSKjB_wy_08o-vLHSkWpU4otS7A5b0YRZZx99EUg/exec";

    // 접속 시 파라미터(mode=setting 등)가 있다면 그대로 전달하며 이동
    const currentQuery = window.location.search;
    window.location.href = WEB_APP_URL + currentQuery;
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>WiseRunner로 연결 중입니다...</p>
  </div>
</body>
</html>
